<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Toán 6 - Kết nối tri thức | Học Toán Thông Minh</title>
<meta name="description" content="App học Toán lớp 6 theo sách Kết nối tri thức với cuộc sống. Bài giảng tương tác, quiz, gamification.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app">
  <!-- SIDEBAR -->
  <div id="sidebar">
    <div class="sidebar-logo" onclick="toggleSidebar()">
      <div class="logo-icon">🧮</div>
      <div class="logo-text">
        <h1>Toán 6</h1>
        <p>Kết nối tri thức</p>
      </div>
    </div>
    <nav class="sidebar-nav" id="sidebarNav">
      <div class="nav-section-title">Tổng quan</div>
      <div class="nav-item active" id="nav-home" onclick="showView('home')">
        <span class="nav-icon">🏠</span>
        <span class="nav-label">Trang chủ</span>
      </div>
      <div class="nav-item" id="nav-progress" onclick="showView('progress')">
        <span class="nav-icon">📊</span>
        <span class="nav-label">Tiến độ</span>
      </div>

      <div class="nav-section-title" style="margin-top:8px">TẬP 1</div>
      <!-- Chapters will be injected here by JS -->
      <div id="chaptersNav"></div>
    </nav>
  </div>

  <!-- MAIN -->
  <div id="main">
    <!-- TOPBAR -->
    <div id="topbar">
      <div class="topbar-toggle" onclick="toggleSidebar()">☰</div>
      <div class="topbar-breadcrumb" id="breadcrumb">
        <span>Trang chủ</span>
      </div>
      <div class="topbar-stats">
        <div class="stat-pill theme-selector-pill">
          <select id="theme-selector" onchange="changeTheme(this.value)" style="background:transparent; border:none; color:inherit; font-weight:600; font-family:inherit; outline:none; cursor:pointer; font-size:12px;">
            <option value="dark" style="background:var(--c-surface); color:var(--c-text)">🌑 Tối</option>
            <option value="strawberry" style="background:var(--c-surface); color:var(--c-text)">🍓 Dâu</option>
            <option value="mint" style="background:var(--c-surface); color:var(--c-text)">🌿 Bạc Hà</option>
          </select>
        </div>
        <div class="stat-pill xp"><span class="sp-icon">⭐</span><span id="top-xp">0</span> XP</div>
        <div class="stat-pill streak"><span class="sp-icon">🔥</span><span id="top-streak">0</span></div>
        <div class="stat-pill level"><span class="sp-icon">🎖</span>Lv <span id="top-level">1</span></div>
      </div>
    </div>

    <!-- CONTENT -->
    <div id="content">
      <!-- HOME VIEW -->
      <div class="view active" id="view-home">
        <!-- Dynamic content -->
      </div>

      <!-- LESSON VIEW -->
      <div class="view" id="view-lesson">
        <!-- Dynamic content -->
      </div>

      <!-- QUIZ VIEW -->
      <div class="view" id="view-quiz">
        <!-- Dynamic content -->
      </div>

      <!-- PROGRESS VIEW -->
      <div class="view" id="view-progress">
        <!-- Dynamic content -->
      </div>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"><span class="toast-icon" id="toast-icon">🎉</span><span id="toast-msg"></span></div>

<!-- MASCOT KỲ LÂN PI COMPANION -->
<div id="mascot-container" class="mascot-idle" onclick="triggerMascotGiggle()">
  <div class="mascot-bubble" id="mascot-bubble">Chào bạn! Mình là Kỳ Lân Pi, cùng học Toán nhé! 🦄✨</div>
  <div class="mascot-avatar" id="mascot-avatar"></div>
</div>

<script src="js/curriculum.js"></script>
<script src="js/app.js"></script>
</body>
</html>
